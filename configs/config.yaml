# LexiScan Auto Configuration

project:
  name: "LexiScan Auto"
  version: "1.0.0"
  description: "Production-Grade Legal NER System"

paths:
  data_dir: "./data"
  raw_contracts: "./data/raw/full_contract_txt"
  annotations: "./data/annotations"
  processed: "./data/processed"
  models: "./models"
  logs: "./logs"

ocr:
  engine: "tesseract"
  language: "eng"
  dpi: 300
  confidence_threshold: 60
  preprocessing:
    denoise: true
    deskew: true
    enhance_contrast: true

entities:
  labels:
    - "PARTY"
    - "DATE"
    - "AMOUNT"
    - "JURISDICTION"
    - "TERM"
  
  iob_scheme: "IOB2"  # Inside-Outside-Beginning
  
  date_formats:
    - "%B %d, %Y"      # January 1, 2024
    - "%m/%d/%Y"       # 01/01/2024
    - "%Y-%m-%d"       # 2024-01-01
    - "%d %B %Y"       # 1 January 2024

models:
  baseline:
    tfidf:
      max_features: 5000
      ngram_range: [1, 3]
    
  spacy:
    base_model: "en_core_web_sm"
    iterations: 30
    dropout: 0.2
    batch_size: 32
    
  bilstm:
    embedding_dim: 100
    lstm_units: 128
    dropout: 0.3
    recurrent_dropout: 0.3
    batch_size: 32
    epochs: 50
    learning_rate: 0.001
    early_stopping_patience: 5

validation:
  date_consistency: true
  entity_relationships: true
  format_standardization: true
  confidence_threshold: 0.7

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  max_upload_size_mb: 10
  timeout_seconds: 30

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/lexiscan.log"
